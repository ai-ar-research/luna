name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  build:
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        c_compiler: [gcc, clang]
        include:
          - os: ubuntu-24.04
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-24.04
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-14
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: macos-14
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp ninja

      - name: Install OpenMP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libomp-dev ninja-build

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('cmake/versions.cmake') }}
          restore-keys: deps-${{ matrix.os }}-

      - name: Configure
        run: >
          ./configure.sh
          --auto-download
          --build-dir build
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cpp_compiler }}

      - name: Build
        run: make

      - name: Test
        run: make test
